  <!-- CONTACT -->
  <main class="contact-section">
    <div class="container--xs">
      <h1 class="fade-in">Get in touch.</h1>
      <p class="fade-in">Collaborations, questions, or just want to say something useful.</p>

      <form name="contact" method="POST" data-netlify="true" class="contact-form fade-in">
        <input type="hidden" name="form-name" value="contact">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
        </div>

        <button type="submit" class="btn btn--solid">Send it →</button>
      </form>

        <p>Or find us on</p>
